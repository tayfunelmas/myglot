<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGlot</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>MyGlot</h1>
        <nav>
            <button type="button" class="tab active" data-tab="home">Home</button>
            <button type="button" class="tab" data-tab="practice">Practice</button>
            <button type="button" class="tab" data-tab="settings">Settings</button>
        </nav>
    </header>

    <main>
        <!-- HOME TAB -->
        <section id="home" class="tab-content active">
            <div class="add-form">
                <h2>Add New Item</h2>
                <div class="form-row">
                    <textarea id="source-text" placeholder="Type a word, phrase, or sentence in your source language..." rows="2"></textarea>
                </div>
                <div class="form-row">
                    <textarea id="target-text" placeholder="Translation will appear here (or type your own)..." rows="2"></textarea>
                </div>
                <div class="form-row">
                    <select id="category-select">
                        <option value="">No category</option>
                    </select>
                    <input id="new-category" type="text" placeholder="Or type new category name...">
                </div>
                <div class="form-row add-buttons">
                    <button type="button" id="btn-translate">Translate</button>
                    <button type="button" id="btn-gen-audio">Generate Audio</button>
                    <button type="button" id="btn-add-item" class="primary">Add Item</button>
                </div>
                <div id="audio-preview"></div>
                <div id="add-status" class="status"></div>
            </div>

            <div class="list-controls">
                <h2>Your Items</h2>
                <div class="filters">
                    <input id="home-search" type="text" placeholder="Search...">
                    <select id="home-category-filter" multiple>
                    </select>
                </div>
            </div>
            <div id="items-list" class="items-list"></div>
        </section>

        <!-- PRACTICE TAB -->
        <section id="practice" class="tab-content">
            <h2>Practice</h2>
            <div class="filters">
                <select id="practice-category-filter" multiple>
                </select>
            </div>
            <div id="practice-list" class="items-list"></div>
        </section>

        <!-- SETTINGS TAB -->
        <section id="settings" class="tab-content">
            <h2>Settings</h2>
            <div class="settings-form">
                <label>Source Language (BCP-47)
                    <input id="setting-source-lang" type="text" placeholder="en-US">
                </label>
                <label>Target Language (BCP-47)
                    <input id="setting-target-lang" type="text" placeholder="de-DE">
                </label>
                <label>TTS Voice
                    <select id="setting-tts-voice">
                        <option value="">Default (auto-select)</option>
                    </select>
                </label>
                <button type="button" id="btn-load-voices">Load Voices for Target Language</button>
                <button type="button" id="btn-save-settings" class="primary">Save Settings</button>
                <div id="settings-status" class="status"></div>

                <hr>
                <h3>Provider Status</h3>
                <button type="button" id="btn-test-providers">Test Providers</button>
                <div id="provider-status" class="provider-status"></div>
            </div>

            <hr>
            <h3>Manage Categories</h3>
            <div class="category-manager">
                <div class="form-row">
                    <input id="new-cat-name" type="text" placeholder="New category name...">
                    <button type="button" id="btn-add-cat">Add Category</button>
                </div>
                <div id="categories-list" class="categories-list"></div>
            </div>

            <hr>
            <h3>Database Backup &amp; Restore</h3>
            <div class="settings-form">
                <p style="color:#495057;font-size:14px;margin-bottom:12px;">Download a snapshot of the entire database, or restore from a previous backup.</p>
                <div class="form-row">
                    <button type="button" id="btn-backup-db">Download Backup</button>
                </div>
                <div id="backup-status" class="status"></div>
                <hr>
                <div class="form-row">
                    <input type="file" id="restore-file" accept=".db">
                    <button type="button" id="btn-restore-db" class="danger">Restore from Backup</button>
                </div>
                <div id="restore-status" class="status"></div>
            </div>
        </section>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Edit Item</h3>
            <input type="hidden" id="edit-item-id">
            <label>Target Text
                <textarea id="edit-target-text" rows="3"></textarea>
            </label>
            <label>Category
                <select id="edit-category-select">
                    <option value="0">No category</option>
                </select>
            </label>
            <div class="modal-actions">
                <button type="button" id="btn-edit-save" class="primary">Save</button>
                <button type="button" id="btn-edit-cancel">Cancel</button>
            </div>
            <div id="edit-status" class="status"></div>
        </div>
    </div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/util.js"></script>
    <script type="module" src="/js/recorder.js"></script>
    <script type="module" src="/js/home.js"></script>
    <script type="module" src="/js/practice.js"></script>
    <script type="module" src="/js/settings.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
